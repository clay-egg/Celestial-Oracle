<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark mystic background for visibility -->
  <circle cx="50" cy="50" r="50" fill="#0a0a12" />

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" stroke="#c9a84c" stroke-width="1.5" opacity="0.8" />
  <circle cx="50" cy="50" r="42" stroke="#c9a84c" stroke-width="0.5" opacity="0.5" />

  <!-- Crystal ball / orb -->
  <circle cx="50" cy="50" r="28" fill="#c9a84c" opacity="0.1" />
  <circle cx="50" cy="50" r="28" stroke="#c9a84c" stroke-width="1.5" opacity="0.9" />

  <!-- Inner glow -->
  <circle cx="50" cy="48" r="18" fill="#c9a84c" opacity="0.2" />

  <!-- Eye of providence / all-seeing eye -->
  <ellipse cx="50" cy="50" rx="16" ry="10" stroke="#c9a84c" stroke-width="1.2" opacity="0.9" />
  <circle cx="50" cy="50" r="5" fill="#c9a84c" opacity="0.8" />
  <circle cx="50" cy="50" r="2.5" fill="#c9a84c" opacity="1" />

  <!-- Light reflection -->
  <circle cx="42" cy="40" r="3" fill="#c9a84c" opacity="0.4" />

  <!-- Crescent moon - top left -->
  <path d="M22 22 A10 10 0 0 1 28 14 A8 8 0 0 0 22 22Z" fill="#c9a84c" opacity="0.8" />

  <!-- Star points around the orb -->
  <circle cx="50" cy="12" r="2" fill="#c9a84c" opacity="0.9" />
  <circle cx="50" cy="88" r="2" fill="#c9a84c" opacity="0.9" />
  <circle cx="12" cy="50" r="2" fill="#c9a84c" opacity="0.9" />
  <circle cx="88" cy="50" r="2" fill="#c9a84c" opacity="0.9" />

  <!-- Diagonal star points -->
  <circle cx="23" cy="23" r="1.5" fill="#c9a84c" opacity="0.7" />
  <circle cx="77" cy="23" r="1.5" fill="#c9a84c" opacity="0.7" />
  <circle cx="23" cy="77" r="1.5" fill="#c9a84c" opacity="0.7" />
  <circle cx="77" cy="77" r="1.5" fill="#c9a84c" opacity="0.7" />

  <!-- Connecting lines from stars to ring -->
  <line x1="50" y1="12" x2="50" y2="22" stroke="#c9a84c" stroke-width="0.8" opacity="0.5" />
  <line x1="50" y1="78" x2="50" y2="88" stroke="#c9a84c" stroke-width="0.8" opacity="0.5" />
  <line x1="12" y1="50" x2="22" y2="50" stroke="#c9a84c" stroke-width="0.8" opacity="0.5" />
  <line x1="78" y1="50" x2="88" y2="50" stroke="#c9a84c" stroke-width="0.8" opacity="0.5" />

  <!-- Base / stand crescent -->
  <path d="M36 78 Q50 86 64 78" stroke="#c9a84c" stroke-width="1.5" opacity="0.8" fill="none" />
  <path d="M40 82 Q50 88 60 82" stroke="#c9a84c" stroke-width="1.2" opacity="0.6" fill="none" />
</svg>